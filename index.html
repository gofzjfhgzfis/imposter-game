<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPOSTER PRO | Developed by Yusuf</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="glass-card">
        <div id="screen-lobby" class="screen active">
            <h1 class="logo-text">IMPOSTER</h1>
            <span class="dev-badge">Developed by Yusuf</span>
            <button class="main-btn" onclick="initHost()">دروستکردنی ژوور</button>
            <button class="secondary-btn" onclick="showScreen('screen-join')">جۆین بوون</button>
        </div>

        <div id="screen-host" class="screen">
            <p>کۆدی ژوور</p>
            <div class="room-code" id="display-room-id">----</div>
            <div class="settings-grid">
                <input type="number" id="inp-time" value="3" title="Minutes">
                <input type="number" id="inp-imps" value="1" title="Imposters">
            </div>
            <select id="inp-cat">
                <option value="هەمەجۆر">🌍 هەموو بابەتەکان</option>
                <option value="فیلم">🎬 سینەما</option>
                <option value="تەکنەلۆژیا">💻 تەکنەلۆژیا</option>
                <option value="گەردوون">🚀 گەردوون</option>
            </select>
            <div id="player-list"></div>
            <button id="btn-start" class="start-btn" style="display:none;" onclick="startGame()">دەستپێکردنی یاری 🚀</button>
        </div>

        <div id="screen-join" class="screen">
            <h2>جۆین بوون</h2>
            <input type="text" id="join-name" placeholder="ناوی تۆ">
            <input type="number" id="join-code" placeholder="کۆدی ژوور">
            <button class="main-btn" onclick="joinRoom()">چوونە ناو یاری</button>
            <button class="ghost-btn" onclick="showScreen('screen-lobby')">گەڕانەوە</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="timer" id="game-timer">00:00</div>
            <div id="role-box" class="word-box">...</div>
            <p id="cat-hint" class="hint-text"></p>
            <button id="host-stop-btn" class="danger-btn" style="display:none;" onclick="updateStatus('voting')">کۆتایی و دەنگدان</button>
        </div>

        <div id="screen-voting" class="screen">
            <h2>کێ ساختەکارە؟ 🧐</h2>
            <p style="font-size: 12px; margin-bottom: 15px;">کلیک لەسەر ئەو کەسە بکە کە گومانت لێیەتی</p>
            <div id="voting-list" class="voting-grid"></div>
        </div>

        <div id="screen-results" class="screen">
            <h2 class="result-title">ئەنجامەکان</h2>
            <div id="imposter-reveal" class="reveal-box"></div>
            <div id="vote-summary" style="margin-top: 15px; font-size: 14px;"></div>
            <button id="host-replay-btn" class="main-btn" style="display:none; margin-top: 20px;" onclick="replayGame()">دووبارە یاری 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
