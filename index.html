<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساختەکار - Fixed Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #00ff88; --danger: #ff4757; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { width: 100%; max-width: 450px; }
        .app-card { background: var(--glass); backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h1 { font-size: 28px; margin-bottom: 20px; font-weight: 900; color: var(--primary); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: none; font-weight: bold; font-size: 17px; cursor: pointer; background: #fff; color: #000; }
        button:hover { transform: scale(1.02); }
        .btn-primary { background: var(--primary); }
        .room-id-display { font-size: 40px; font-weight: 900; color: var(--primary); letter-spacing: 5px; margin: 15px 0; }
        .player-tag { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; margin: 5px; display: inline-block; font-size: 14px; }
        .timer { font-size: 50px; font-weight: 900; color: #f1c40f; margin: 15px 0; }
        .reveal-box { background: #fff; color: #000; padding: 30px; border-radius: 20px; margin: 20px 0; font-size: 26px; font-weight: 900; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="app-card" id="screen-lobby">
        <h1>ساختەکار کێیە؟</h1>
        <button class="btn-primary" onclick="initHost()">دروستکردنی ژوور</button>
        <button onclick="showScreen('screen-join')">جۆین بوون</button>
    </div>

    <div class="app-card" id="screen-host" style="display:none;">
        <p>کۆدی ژوور</p>
        <div class="room-id-display" id="display-room-id">----</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="inp-time" value="3" placeholder="خولەک">
            <input type="number" id="inp-imps" value="1" placeholder="ساختەکار">
        </div>
        <select id="inp-cat">
            <option value="گشتی">🌍 گشتی</option>
            <option value="فیلم">🎬 سینەما</option>
            <option value="خواردن">🍔 خواردن</option>
            <option value="تەکنەلۆژیا">💻 تەکنەلۆژیا</option>
        </select>
        <div id="host-player-list" style="margin: 20px 0;"></div>
        <button class="btn-primary" id="btn-start" style="display:none;" onclick="startGame()">دەستپێکردن 🚀</button>
    </div>

    <div class="app-card" id="screen-join" style="display:none;">
        <h2>جۆین بوون</h2>
        <input type="text" id="join-name" placeholder="ناوەکەت">
        <input type="number" id="join-code" placeholder="کۆدی ژوور">
        <button class="btn-primary" onclick="joinRoom()">چوونە ژوورەوە</button>
        <button onclick="showScreen('screen-lobby')">گەڕانەوە</button>
    </div>

    <div class="app-card" id="screen-game" style="display:none;">
        <div class="timer" id="game-timer">00:00</div>
        <div id="role-box" class="reveal-box">...</div>
        <p id="cat-hint" style="opacity: 0.6; margin-bottom: 15px;"></p>
        <button id="host-stop-btn" style="display:none; background: var(--danger); color:#fff;" onclick="updateStatus('voting')">کۆتایی و دەنگدان 🗳️</button>
    </div>

    <div class="app-card" id="screen-voting" style="display:none;">
        <h2>دەنگ بدە!</h2>
        <div id="vote-btns-container" style="margin-top: 20px;"></div>
        <button id="host-result-btn" style="display:none; background: var(--primary); margin-top: 20px;" onclick="updateStatus('results')">بینینی ئەنجام 📊</button>
    </div>

    <div class="app-card" id="screen-results" style="display:none;">
        <h2>ئەنجامەکان</h2>
        <div id="vote-summary" style="margin: 20px 0; text-align: right;"></div>
        <div id="imposter-reveal" class="reveal-box" style="background: var(--danger); color: #fff;"></div>
        <button id="host-replay-btn" style="display:none; background: var(--primary);" onclick="replayGame()">دووبارە یاری بکەرەوە 🔄</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCGX5s8Z8m-DhMXDRVmF0F6Yje_p7A",
        authDomain: "yousif-eda79.firebaseapp.com",
        databaseURL: "https://yousif-eda79-default-rtdb.firebaseio.com",
        projectId: "yousif-eda79"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID, myName, isHost = false, timer;
    const wordsPool = {
        "گشتی": ["قوتابخانە", "پارک", "ماڵ", "سەعات", "کتێب", "پێنووس"],
        "فیلم": ["ئینتەرستێلار", "ئینسیپشن", "سێڤن", "تایتانیک", "جۆکەر"],
        "تەکنەلۆژیا": ["کۆمپیوتەر", "ئایفۆن", "فایەربەیس", "ڕۆبۆت", "ئینتەرنێت"],
        "خواردن": ["پیتزا", "کەباب", "دۆڵمە", "برنج", "ماسی"]
    };

    function showScreen(id) {
        document.querySelectorAll('.app-card').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function updateStatus(s) { db.ref(`rooms/${roomID}/status`).set(s); }

    function initHost() {
        isHost = true;
        roomID = Math.floor(1000 + Math.random() * 9000).toString();
        db.ref(`rooms/${roomID}`).set({ status: 'waiting' });
        document.getElementById('display-room-id').innerText = roomID;
        showScreen('screen-host');
        listenToPlayers();
        listenToStatus();
    }

    function listenToPlayers() {
        db.ref(`rooms/${roomID}/players`).on('value', snap => {
            const players = snap.val() || {};
            const list = Object.values(players).map(p => `<span class="player-tag">👤 ${p.name}</span>`).join("");
            document.getElementById('host-player-list').innerHTML = list;
            if(isHost) document.getElementById('btn-start').style.display = Object.keys(players).length >= 3 ? 'block' : 'none';
        });
    }

    function joinRoom() {
        myName = document.getElementById('join-name').value.trim();
        roomID = document.getElementById('join-code').value.trim();
        if(!myName || !roomID) return alert("تکایە ناو و کۆد بنووسە");

        // پشکنین: ئایا ژوورەکە هەیە و یاری دەستی پێکردووە؟
        db.ref(`rooms/${roomID}`).once('value', snap => {
            const data = snap.val();
            if(!data) return alert("ئەم ژوورە بوونی نییە!");
            if(data.status !== 'waiting') return alert("ببورە، یارییەکە دەستی پێکردووە و ناتوانیت جۆین ببی!");

            // ئەگەر کێشە نەبوو، جۆین دەبێت
            db.ref(`rooms/${roomID}/players`).push({ name: myName });
            showScreen('screen-host');
            document.getElementById('screen-host').innerHTML = `<h1>بەخێرهاتی ${myName}</h1><p>کۆدی ژوور: ${roomID}</p><p>چاوەڕێی Host بکە تا دەست پێ دەکات...</p>`;
            listenToStatus();
        });
    }

    function listenToStatus() {
        db.ref(`rooms/${roomID}/status`).on('value', snap => {
            const s = snap.val();
            if(s === 'active') runGame();
            if(s === 'voting') runVote();
            if(s === 'results') runResults();
            if(s === 'waiting' && !isHost && document.getElementById('screen-results').style.display === 'block') {
                location.reload(); // یاریزانەکان ڕیسێت دەبنەوە بۆ لۆبی
            }
        });
    }

    function startGame() {
        const cat = document.getElementById('inp-cat').value;
        const word = wordsPool[cat][Math.floor(Math.random() * wordsPool[cat].length)];
        const time = parseInt(document.getElementById('inp-time').value) * 60;
        const impCount = parseInt(document.getElementById('inp-imps').value);

        db.ref(`rooms/${roomID}/players`).once('value', snap => {
            const keys = Object.keys(snap.val());
            const imps = keys.sort(() => 0.5 - Math.random()).slice(0, impCount);
            db.ref(`rooms/${roomID}`).update({
                status: 'active', word: word, category: cat, imposters: imps, duration: time, votes: null
            });
        });
    }

    function runGame() {
        showScreen('screen-game');
        if(isHost) document.getElementById('host-stop-btn').style.display = 'block';
        db.ref(`rooms/${roomID}`).once('value', snap => {
            const d = snap.val();
            const myKey = Object.keys(d.players).find(k => d.players[k].name === myName || (isHost && !myName));
            const isImp = d.imposters.includes(myKey);
            document.getElementById('role-box').innerText = isImp ? "تۆ ساختەکاریت! 🤫" : d.word;
            document.getElementById('role-box').style.color = isImp ? "var(--danger)" : "var(--primary)";
            document.getElementById('cat-hint').innerText = "بابەت: " + d.category;
            startTimer(d.duration);
        });
    }

    function startTimer(sec) {
        clearInterval(timer);
        let t = sec;
        timer = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('game-timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(t-- <= 0) { clearInterval(timer); if(isHost) updateStatus('voting'); }
        }, 1000);
    }

    function runVote() {
        clearInterval(timer);
        showScreen('screen-voting');
        if(isHost) document.getElementById('host-result-btn').style.display = 'block';
        db.ref(`rooms/${roomID}/players`).once('value', snap => {
            const p = snap.val();
            let h = "";
            for(let k in p) if(p[k].name !== myName) h += `<button onclick="submitVote('${p[k].name}')">دەنگ بۆ ${p[k].name}</button>`;
            document.getElementById('vote-btns-container').innerHTML = h;
        });
    }

    function submitVote(n) {
        db.ref(`rooms/${roomID}/votes/${myName || 'Host'}`).set(n);
        document.getElementById('vote-btns-container').innerHTML = "<h3>✓ دەنگەکەت تۆمار کرا</h3>";
    }

    function runResults() {
        showScreen('screen-results');
        if(isHost) document.getElementById('host-replay-btn').style.display = 'block';
        db.ref(`rooms/${roomID}`).once('value', snap => {
            const d = snap.val();
            const v = d.votes || {}, tally = {};
            for(let x in v) tally[v[x]] = (tally[v[x]] || 0) + 1;
            let h = "<ul>";
            for(let n in tally) h += `<li>${n}: <b>${tally[n]} دەنگ</b></li>`;
            document.getElementById('vote-summary').innerHTML = h + "</ul>";
            const imps = d.imposters.map(k => d.players[k].name).join(" و ");
            document.getElementById('imposter-reveal').innerText = "ساختەکار: " + imps;
        });
    }

    function replayGame() {
        db.ref(`rooms/${roomID}`).update({
            status: 'waiting', word: null, imposters: null, votes: null, category: null
        }).then(() => location.reload());
    }
</script>
</body>
</html>
