<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ساختەکار ئۆنلاین - یوسف</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* باکگراوندی جووڵاو */
        body {
            margin: 0; padding: 20px; font-family: 'Tahoma', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #1a2a6c, #11998e, #38ef7d, #2980b9);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* دیزاینی شوشەیی (Glassmorphism) */
        .app {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); width: 100%; max-width: 450px;
            border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 { margin-top: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .dev-tag { background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; font-size: 14px; }

        /* دوگمە و خانەکان */
        button {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #6dd5ed, #2193b0); color: white;
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.98); }

        .btn-host { background: linear-gradient(135deg, #f12711, #f5af19); }
        .btn-start { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-exit { background: rgba(0,0,0,0.5); }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: none; background: rgba(255,255,255,0.9);
            text-align: center; font-size: 16px; box-sizing: border-box; outline: none;
            color: #333; font-weight: bold;
        }

        .settings-row { display: flex; gap: 10px; margin: 10px 0; }
        .settings-row > div { flex: 1; }
        .settings-label { font-size: 14px; display: block; margin-bottom: 5px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);}

        .room-id {
            font-size: 38px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.3);
            padding: 15px; border-radius: 15px; margin: 15px 0; letter-spacing: 5px;
            border: 2px dashed rgba(255,255,255,0.5); text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .player-card {
            background: rgba(255,255,255,0.2); padding: 8px 15px; margin: 5px;
            border-radius: 20px; display: inline-block; border: 1px solid rgba(255,255,255,0.4);
            font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .secret-card {
            font-size: 30px; padding: 40px; background: white; border-radius: 20px;
            margin: 20px 0; font-weight: bold; color: #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.3);
        }

        .timer-display {
            font-size: 40px; font-weight: bold; margin: 15px 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5); color: #f1c40f;
        }
    </style>
</head>
<body>

<div class="app" id="lobby">
    <h1>🕵️ ساختەکار کێیە؟</h1>
    <span class="dev-tag">پەرەپێدەر: یوسف</span>

    <div id="initial-actions" style="margin-top: 30px;">
        <button class="btn-host" onclick="showHost()">🏠 دروستکردنی ژوور (Host)</button>
        <button onclick="showJoin()">🚪 جۆین بوون (Join)</button>
    </div>

    <div id="host-area" style="display:none;">
        <p>کۆدی ژوورەکە بنێرە بۆ هاوڕێکانت:</p>
        <div class="room-id" id="room-code-display">----</div>
        
        <div class="settings-row">
            <div>
                <label class="settings-label">⏱️ کات (خولەک):</label>
                <input type="number" id="game-time" value="3" min="1" max="10">
            </div>
            <div>
                <label class="settings-label">🤫 ژمارەی ساختەکار:</label>
                <input type="number" id="imposter-count" value="1" min="1" max="3">
            </div>
        </div>
        
        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-top: 10px;">
            <label style="font-weight: bold; display: block; margin-bottom: 10px;">👥 زیادکردنی هاوڕێ لەلایەن خۆتەوە:</label>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="host-player-input" placeholder="ناو بنووسە..." style="margin: 0;">
                <button onclick="addPlayerByHost()" style="width: auto; margin: 0; padding: 0 20px;">+ زیادکردن</button>
            </div>
        </div>

        <div id="players-waiting" style="margin: 20px 0; min-height: 50px;"></div>
        <button onclick="startOnlineGame()" id="start-btn" class="btn-start" style="display:none;">دەستپێکردنی یاری 🚀</button>
    </div>

    <div id="join-area" style="display:none;">
        <input type="text" id="join-name-input" placeholder="ناوی خۆت بنووسە">
        <input type="number" id="join-room-input" placeholder="کۆدی ژوور (٤ ڕەقەم)">
        <button onclick="processJoin()" class="btn-start">چوونە ژوورەوە 🚪</button>
    </div>
</div>

<div class="app" id="game-screen" style="display:none;">
    <h2 id="display-name-tag" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">---</h2>
    <div id="timer-display" class="timer-display">00:00</div>
    <div id="secret-box" class="secret-card">چاوەڕێ بکە...</div>
    <p style="opacity: 0.9;">گفتوگۆ بکەن تا ساختەکارەکە دەدۆزنەوە!</p>
    <button onclick="location.reload()" class="btn-exit">🔄 گەڕانەوە بۆ سەرەتا</button>
</div>

<script>
    // --- دەنگ و میوزیک ---
    // میوزیکی چاوەڕوانی (Lobby Music)
    const lobbyMusic = new Audio('https://assets.mixkit.co/active_storage/sfx/135/135-preview.mp3');
    lobbyMusic.loop = true;
    lobbyMusic.volume = 0.4; // دەنگی نزمە بۆ ئەوەی بێزارکەر نەبێت

    // دەنگی دەستپێکردنی یاری
    const startSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

    // زانیارییەکانی Firebase یوسف
    const firebaseConfig = {
        apiKey: "AIzaSyCGX5s8Z8m-DhMXDRVmF0F6Yje_p7A",
        authDomain: "yousif-eda79.firebaseapp.com",
        databaseURL: "https://yousif-eda79-default-rtdb.firebaseio.com",
        projectId: "yousif-eda79",
        storageBucket: "yousif-eda79.appspot.com",
        messagingSenderId: "748927706716",
        appId: "1:748927706716:web:19d974c0846e8103986884"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID, myName, isHost = false;
    let timerInterval;

    function playLobbyMusic() {
        lobbyMusic.play().catch(e => console.log("یاریزان هێشتا کلیکی نەکردووە بۆ میوزیک"));
    }

    function showHost() {
        isHost = true;
        playLobbyMusic(); // لێدانی میوزیک
        roomID = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('room-code-display').innerText = roomID;
        document.getElementById('initial-actions').style.display = 'none';
        document.getElementById('host-area').style.display = 'block';

        db.ref('rooms/' + roomID + '/players').on('value', (snap) => {
            const players = snap.val();
            let listHTML = "";
            if(players) {
                Object.keys(players).forEach(key => {
                    listHTML += `<span class="player-card">${players[key].name}</span>`;
                });
                // ئەگەر ٣ یاریزان یان زیاتر هەبوو دوگمەی دەستپێکردن دەردەکەوێت
                if(Object.keys(players).length >= 3) document.getElementById('start-btn').style.display = 'block';
            }
            document.getElementById('players-waiting').innerHTML = listHTML;
        });
    }

    function addPlayerByHost() {
        let input = document.getElementById('host-player-input');
        let name = input.value.trim();
        if(name) {
            db.ref('rooms/' + roomID + '/players').push({ name: name });
            input.value = "";
        }
    }

    function showJoin() {
        playLobbyMusic(); // لێدانی میوزیک
        document.getElementById('initial-actions').style.display = 'none';
        document.getElementById('join-area').style.display = 'block';
    }

    function processJoin() {
        myName = document.getElementById('join-name-input').value.trim();
        roomID = document.getElementById('join-room-input').value.trim();
        if(!myName || !roomID) return alert("تکایە ناو و کۆدی ژوور بنووسە!");

        db.ref('rooms/' + roomID + '/players').push({ name: myName });
        document.getElementById('join-area').innerHTML = "<h3>تۆ جۆین بوویت! چاوەڕێی دەستپێکردن بکە... 🎵</h3>";

        db.ref('rooms/' + roomID + '/status').on('value', (snap) => {
            if(snap.val() === "active") loadGameView();
        });
    }

    function startOnlineGame() {
        const words = ["کەباب", "پیتزا", "هەولێر", "سلێمانی", "مۆبایل", "سەیارە", "فڕۆکە", "قوتابخانە", "پارک", "زانکۆ", "کۆمپیوتەر", "یاریگا"];
        let secretWord = words[Math.floor(Math.random() * words.length)];
        
        let reqTime = parseInt(document.getElementById('game-time').value) || 3;
        let reqImposters = parseInt(document.getElementById('imposter-count').value) || 1;

        db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
            let players = snap.val();
            let keys = Object.keys(players);
            
            // دیاریکردنی ساختەکارەکان (زیاتر لە یەکێک ئەگەر دیاری کرابێت)
            if (reqImposters >= keys.length) reqImposters = keys.length - 1; // نابێت هەموویان ساختەکار بن
            if (reqImposters < 1) reqImposters = 1;

            let shuffledKeys = keys.sort(() => 0.5 - Math.random());
            let imposterIDs = shuffledKeys.slice(0, reqImposters);

            db.ref('rooms/' + roomID).update({
                status: "active",
                word: secretWord,
                imposters: imposterIDs, // ئێستا ئەڕەیەکە (Array) نەک یەک کەس
                duration: reqTime * 60 // گۆڕینی خولەک بۆ چرکە
            });
            loadGameView();
        });
    }

    function loadGameView() {
        // وەستانی میوزیکی چاوەڕوانی و لێدانی دەنگی دەستپێکردن
        lobbyMusic.pause();
        lobbyMusic.currentTime = 0;
        startSound.play().catch(e => console.log("Sound error:", e));

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('display-name-tag').innerText = "یاریزان: " + (myName || "Host");

        db.ref('rooms/' + roomID).once('value', (snap) => {
            let data = snap.val();
            
            // دۆزینەوەی ئایدی خۆت لەناو داتابەیس
            let myKey = Object.keys(data.players).find(k => data.players[k].name === myName);
            
            let box = document.getElementById('secret-box');
            // پشکنین ئایا تۆ یەکێکی لە ساختەکارەکان؟
            if(data.imposters && data.imposters.includes(myKey)) {
                box.innerText = "تۆ ساختەکاریت! 🤫";
                box.style.color = "#e74c3c";
            } else {
                box.innerText = "وشە: " + data.word;
                box.style.color = "#27ae60";
            }

            // دەستپێکردنی کاتژمێر (Timer)
            startTimer(data.duration);
        });
    }

    function startTimer(totalSeconds) {
        let timeLeft = totalSeconds;
        let timerDisplay = document.getElementById('timer-display');
        
        clearInterval(timerInterval); // پاککردنەوەی هەر تایمەرێکی پێشوو
        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            // ڕێکخستنی شێوەی کاتەکە بۆ نموونە 03:05
            timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            if(timeLeft <= 10) timerDisplay.style.color = "#e74c3c"; // ئەگەر ١٠ چرکە ما سوور دەبێت
            
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                timerDisplay.innerText = "کات تەواو! ⏰";
                document.getElementById('secret-box').innerText = "کاتی دەنگدانە!";
                document.getElementById('secret-box').style.color = "#333";
            }
            timeLeft--;
        }, 1000);
    }
</script>
</body>
</html>
