<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPOSTER ULTRA | Yusuf</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <div id="sc-home" class="screen active">
            <h1 class="logo">IMPOSTER<span>PRO</span></h1>
            <div class="main-btns">
                <button id="btn-create" class="p-btn">دروستکردنی ژوور</button>
                <button id="btn-join" class="s-btn">جۆین بوون</button>
            </div>
            <div class="dev-info">Developed by Yusuf</div>
        </div>

        <div id="sc-auth" class="screen">
            <h2 id="auth-title">ڕێکخستن</h2>
            <input type="text" id="in-name" placeholder="ناوت بنووسە..." maxlength="10">
            <input type="number" id="in-code" placeholder="کۆدی ژوور..." style="display: none;">
            <button id="btn-go" class="p-btn">بەردەوام بوون</button>
            <button id="btn-back" class="link-btn">گەڕانەوە</button>
        </div>

        <div id="sc-lobby" class="screen">
            <div class="room-card">
                <span>کۆدی ژوور:</span>
                <h2 id="room-id">----</h2>
            </div>
            <div class="player-list-container">
                <p>یاریزانەکان (<span id="p-count">0</span>):</p>
                <div id="p-list"></div>
            </div>
            <div id="host-ui" style="display: none;">
                <button id="btn-start" class="g-btn">دەستپێکردنی یاری 🚀</button>
            </div>
            <button id="btn-leave" class="r-btn">چوونە دەرەوە</button>
        </div>

        <div id="sc-game" class="screen">
            <div id="game-info" class="badge">کەتەگۆری: ...</div>
            <div class="card" id="role-card">
                <div class="card-inner">
                    <div class="card-front">کلیک بکە بۆ بینینی وشە</div>
                    <div class="card-back">
                        <h2 id="word-txt">?</h2>
                        <p id="hint-txt"></p>
                    </div>
                </div>
            </div>
            <div id="host-replay" style="display: none;">
                <button id="btn-reset" class="p-btn">دووبارە کردنەوە</button>
            </div>
            <button id="btn-quit" class="r-btn">کۆتایی یاری</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
