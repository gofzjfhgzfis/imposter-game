<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPOSTER | Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="glass-card">
        <div id="screen-lobby" class="screen active">
            <h1 class="logo-text">IMPOSTER</h1>
            
            <div class="creator-badge">
                <span class="pulse-dot"></span>
                DEVELOPED BY YUSUF
            </div>

            <button onclick="initHost()">دروستکردنی ژوور</button>
            <button style="background: rgba(255,255,255,0.08); color: white;" onclick="showScreen('screen-join')">جۆین بوون</button>
        </div>

        <div id="screen-host" class="screen">
            <h3 style="opacity:0.6;">کۆدی ژوورەکەت</h3>
            <div class="room-code" id="display-room-id">----</div>
            
            <div id="host-only-ui" style="display:none;">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="inp-time" value="3" min="1" title="کات بە خولەک" placeholder="خولەک">
                    <input type="number" id="inp-imps" value="1" min="1" title="ژمارەی ساختەکار" placeholder="چەند ساختەکار؟">
                </div>
                <select id="inp-cat" class="category-select">
                    <option value="هەمەجۆر" selected>🌍 گشتی (هەمەجۆر)</option>
                    <option value="فیلم">🎬 سینەما</option>
                    <option value="تەکنەلۆژیا">💻 تەکنەلۆژیا</option>
                    <option value="گەردوون">🚀 گەردوون</option>
                </select>
            </div>
            <div id="player-list" style="margin: 20px 0;"></div>
            <button id="btn-start" style="display:none;" onclick="startGame()">دەستپێکردن ⚡</button>
        </div>

        <div id="screen-join" class="screen">
            <h2>چوونە ناو ژوور</h2>
            <input type="text" id="join-name" placeholder="ناوەکەت بنووسە">
            <input type="number" id="join-code" placeholder="کۆدی ژوور">
            <button onclick="joinRoom()">چوونە ناوەوە</button>
            <button style="background:none; border: 1px solid rgba(255,255,255,0.2); color:white;" onclick="showScreen('screen-lobby')">گەڕانەوە</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="timer" id="game-timer">00:00</div>
            <div id="role-box" class="word-box">...</div>
            <p id="cat-hint" style="opacity:0.8; font-weight:bold;"></p>
            <button id="stop-game-btn" style="display:none; background: #ff4b2b; color: white;" onclick="updateStatus('voting')">کۆتایی و دەنگدان</button>
        </div>

        <div id="screen-voting" class="screen">
            <h2 style="margin-bottom:20px;">کێ گوماناوییە؟ 🧐</h2>
            <div id="voting-list" class="voting-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        </div>

        <div id="screen-results" class="screen">
            <h2 style="color:#ff4b2b;">ئەنجامەکان</h2>
            <div id="imposter-reveal" class="word-box" style="background:#ff4b2b; color:white; font-size: 20px;"></div>
            <div id="vote-summary" style="line-height:1.8; text-align: right; padding: 10px;"></div>
            <button style="margin-top:20px;" onclick="location.reload()">دووبارە یاری 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
