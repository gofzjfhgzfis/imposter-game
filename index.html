<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساختەکار - Advanced Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #00ff88;
            --danger: #ff4757;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* باکگراوندی جوڵاو (Brutalist style) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .main-container { width: 100%; max-width: 480px; padding: 20px; }

        .app-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 40px;
            padding: 40px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 32px; letter-spacing: -1px; margin-bottom: 10px; font-weight: 900; }
        .badge { background: var(--primary); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        input, select {
            width: 100%; padding: 18px; margin: 12px 0; border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
            color: #fff; font-size: 16px; outline: none; text-align: center;
        }
        input:focus { border-color: var(--primary); }

        button {
            width: 100%; padding: 18px; margin: 10px 0; border-radius: 20px; border: none;
            font-weight: 800; font-size: 18px; cursor: pointer; position: relative;
            background: #fff; color: #000;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }

        .room-code-display {
            font-size: 45px; font-weight: 900; color: var(--primary);
            letter-spacing: 8px; margin: 20px 0; text-shadow: 0 0 15px rgba(0,255,136,0.3);
        }

        .player-tag {
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px;
            margin: 5px; display: inline-block; font-weight: 600; border: 1px solid rgba(255,255,255,0.05);
        }

        .timer { font-size: 60px; font-weight: 900; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        .word-reveal {
            background: #fff; color: #000; padding: 40px 20px; border-radius: 30px;
            margin: 20px 0; font-size: 30px; font-weight: 900; animation: reveal 0.5s ease-out;
        }

        @keyframes reveal { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .grid-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="app-card" id="screen-lobby">
        <h1>IMPOSTER</h1>
        <span class="badge">PRO VERSION</span>
        <div style="margin-top: 40px;">
            <button class="btn-primary" onclick="initHost()">دروستکردنی ژوور</button>
            <button onclick="showScreen('screen-join')">جۆین بوون</button>
        </div>
    </div>

    <div class="app-card" id="screen-host" style="display:none;">
        <p>کۆدی ژوور</p>
        <div class="room-code-display" id="display-room-id">0000</div>
        
        <div class="grid-settings">
            <div><label><small>خولەک</small></label><input type="number" id="inp-time" value="3"></div>
            <div><label><small>ساختەکار</small></label><input type="number" id="inp-imps" value="1"></div>
        </div>

        <select id="inp-cat">
            <option value="گشتی">🌍 هەمەجۆر</option>
            <option value="فیلم">🎬 سینەما</option>
            <option value="تەکنەلۆژیا">💻 تەکنەلۆژیا</option>
            <option value="خواردن">🍔 خواردن</option>
            <option value="وەرزش">⚽ وەرزش</option>
            <option value="وڵاتان">🏳️ وڵاتان</option>
        </select>

        <div id="host-player-list" style="margin: 20px 0;"></div>
        <button class="btn-primary" id="btn-start" style="display:none;" onclick="startGame()">دەستپێکردن 🚀</button>
    </div>

    <div class="app-card" id="screen-join" style="display:none;">
        <h2>جۆین بوون</h2>
        <div class="avatar-selector" style="margin: 20px 0;">
            <span class="player-tag" style="cursor:pointer" onclick="selectAvatar('🤠', this)">🤠</span>
            <span class="player-tag" style="cursor:pointer" onclick="selectAvatar('👽', this)">👽</span>
            <span class="player-tag" style="cursor:pointer" onclick="selectAvatar('🤖', this)">🤖</span>
            <span class="player-tag" style="cursor:pointer" onclick="selectAvatar('👻', this)">👻</span>
        </div>
        <input type="text" id="join-name" placeholder="ناوی تۆ">
        <input type="number" id="join-code" placeholder="کۆدی ژوور">
        <button class="btn-primary" onclick="joinRoom()">چوونە ژوورەوە</button>
        <button onclick="showScreen('screen-lobby')">گەڕانەوە</button>
    </div>

    <div class="app-card" id="screen-game" style="display:none;">
        <div class="timer" id="game-timer">00:00</div>
        <div id="role-box" class="word-reveal">...</div>
        <p id="cat-hint" style="margin-bottom: 20px; opacity: 0.6;"></p>
        <button class="btn-danger" id="host-stop-btn" style="display:none;" onclick="updateStatus('voting')">دەنگدان 🗳️</button>
    </div>

    <div class="app-card" id="screen-voting" style="display:none;">
        <h2>دەنگ بدە!</h2>
        <div id="vote-btns-container" style="margin-top: 20px;"></div>
        <button class="btn-primary" id="host-result-btn" style="display:none; margin-top: 20px;" onclick="updateStatus('results')">ئەنجامەکان 📊</button>
    </div>

    <div class="app-card" id="screen-results" style="display:none;">
        <h2>ئەنجامەکان</h2>
        <div id="vote-summary" style="margin: 20px 0; text-align: right;"></div>
        <div id="imposter-reveal" class="word-reveal" style="background: var(--danger); color: #fff;"></div>
        <button class="btn-primary" id="host-replay-btn" style="display:none;" onclick="replayGame()">دووبارە یاری بکەرەوە 🔄</button>
    </div>
</div>

<script>
    // --- Firebase Setup ---
    const firebaseConfig = {
        apiKey: "AIzaSyCGX5s8Z8m-DhMXDRVmF0F6Yje_p7A",
        authDomain: "yousif-eda79.firebaseapp.com",
        databaseURL: "https://yousif-eda79-default-rtdb.firebaseio.com",
        projectId: "yousif-eda79"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- State ---
    let roomID, myName, myAvatar = '🤠', isHost = false, timer;
    const words = {
        "گشتی": ["قوتابخانە", "کتێبخانە", "پردی دەلال", "پارک", "ماڵ", "سەعات"],
        "فیلم": ["ئینتەرستێلار", "ئینسیپشن", "سێڤن", "تایتانیک", "جۆکەر", "دارک"],
        "تەکنەلۆژیا": ["کۆمپیوتەر", "ئایفۆن", "فایەربەیس", "ڕۆبۆت", "ئینتەرنێت"],
        "خواردن": ["پیتزا", "کەباب", "دۆڵمە", "برنج", "ماسی"],
        "وەرزش": ["تۆپی پێ", "تێنس", "باسکە", "مەلەوانێتی"],
        "وڵاتان": ["کوردستان", "ئەڵمانیا", "ژاپۆن", "بەڕازیل", "ئیتاڵیا"]
    };

    // --- Core Functions ---
    function showScreen(id) {
        document.querySelectorAll('.app-card').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function updateStatus(s) { db.ref(`rooms/${roomID}/status`).set(s); }

    function selectAvatar(a, el) {
        document.querySelectorAll('.player-tag').forEach(t => t.style.background = 'rgba(255,255,255,0.1)');
        el.style.background = 'var(--primary)';
        myAvatar = a;
    }

    // --- Host Logic ---
    function initHost() {
        isHost = true;
        roomID = Math.floor(1000 + Math.random() * 9000).toString();
        db.ref(`rooms/${roomID}`).set({ status: 'waiting', hostName: 'Host' });
        
        document.getElementById('display-room-id').innerText = roomID;
        showScreen('screen-host');

        db.ref(`rooms/${roomID}/players`).on('value', snap => {
            const players = snap.val() || {};
            const list = Object.values(players).map(p => `<span class="player-tag">${p.avatar} ${p.name}</span>`).join("");
            document.getElementById('host-player-list').innerHTML = list;
            document.getElementById('btn-start').style.display = Object.keys(players).length >= 3 ? 'block' : 'none';
        });
        listenToRoom();
    }

    function startGame() {
        const cat = document.getElementById('inp-cat').value;
        const pool = words[cat];
        const word = pool[Math.floor(Math.random() * pool.length)];
        const time = parseInt(document.getElementById('inp-time').value) * 60;
        const impCount = parseInt(document.getElementById('inp-imps').value);

        db.ref(`rooms/${roomID}/players`).once('value', snap => {
            const keys = Object.keys(snap.val());
            const imps = keys.sort(() => 0.5 - Math.random()).slice(0, impCount);
            
            db.ref(`rooms/${roomID}`).update({
                status: 'active',
                word: word,
                category: cat,
                imposters: imps,
                duration: time,
                votes: null // گرنگە بۆ ڕیسێت
            });
        });
    }

    // --- Join Logic ---
    function joinRoom() {
        myName = document.getElementById('join-name').value.trim();
        roomID = document.getElementById('join-code').value.trim();
        if(!myName || !roomID) return alert("زانیارییەکان تەواو بکە");

        db.ref(`rooms/${roomID}/players`).push({ name: myName, avatar: myAvatar });
        showScreen('screen-host'); // بۆ ئەوەی چاوەڕێ بکات
        document.getElementById('screen-host').innerHTML = `<h2>تۆ جۆین بوویت!</h2><p>چاوەڕێی Host بکە...</p>`;
        listenToRoom();
    }

    // --- Game Engine ---
    function listenToRoom() {
        db.ref(`rooms/${roomID}/status`).on('value', snap => {
            const s = snap.val();
            if(s === 'active') runGame();
            if(s === 'voting') runVote();
            if(s === 'results') runResults();
            if(s === 'waiting' && !isHost) resetForNewRound();
        });
    }

    function runGame() {
        showScreen('screen-game');
        if(isHost) document.getElementById('host-stop-btn').style.display = 'block';
        
        db.ref(`rooms/${roomID}`).once('value', snap => {
            const data = snap.val();
            const myKey = Object.keys(data.players).find(k => data.players[k].name === myName);
            const isImp = data.imposters.includes(myKey);
            
            const box = document.getElementById('role-box');
            if(isImp) { box.innerText = "تۆ ساختەکاریت! 🤫"; box.style.color = "var(--danger)"; }
            else { box.innerText = data.word; box.style.color = "var(--primary)"; }
            document.getElementById('cat-hint').innerText = "بابەت: " + data.category;
            
            startTimer(data.duration);
        });
    }

    function startTimer(sec) {
        clearInterval(timer);
        let t = sec;
        timer = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('game-timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(t-- <= 0) { clearInterval(timer); if(isHost) updateStatus('voting'); }
        }, 1000);
    }

    function runVote() {
        clearInterval(timer);
        showScreen('screen-voting');
        if(isHost) document.getElementById('host-result-btn').style.display = 'block';

        db.ref(`rooms/${roomID}/players`).once('value', snap => {
            const p = snap.val();
            let html = "";
            for(let k in p) if(p[k].name !== myName) html += `<button onclick="submitVote('${p[k].name}')">دەنگ بۆ ${p[k].avatar} ${p[k].name}</button>`;
            document.getElementById('vote-btns-container').innerHTML = html;
        });
    }

    function submitVote(n) {
        db.ref(`rooms/${roomID}/votes/${myName}`).set(n);
        document.getElementById('vote-btns-container').innerHTML = "<h3>✓ دەنگەکەت تۆمار کرا</h3>";
    }

    function runResults() {
        showScreen('screen-results');
        if(isHost) document.getElementById('host-replay-btn').style.display = 'block';

        db.ref(`rooms/${roomID}`).once('value', snap => {
            const data = snap.val();
            const votes = data.votes || {};
            const tally = {};
            for(let v in votes) tally[votes[v]] = (tally[votes[v]] || 0) + 1;
            
            let html = "<ul>";
            for(let n in tally) html += `<li>${n}: <b>${tally[n]} دەنگ</b></li>`;
            document.getElementById('vote-summary').innerHTML = html + "</ul>";

            const imps = data.imposters.map(k => data.players[k].avatar + " " + data.players[k].name).join(" و ");
            document.getElementById('imposter-reveal').innerText = "ساختەکار: " + imps;
        });
    }

    // --- The Fix: Replay Logic ---
    function replayGame() {
        // Host ڕیسێتی داتا دەکات لە فایەربەیس
        db.ref(`rooms/${roomID}`).update({
            status: 'waiting',
            word: null,
            imposters: null,
            votes: null,
            category: null
        }).then(() => {
            // Host شاشەی خۆی ڕیسێت دەکات
            location.reload(); // بۆ Host ئاسانترین ڕێگەیە بۆ پاککردنەوەی هەموو Stateـەکان
        });
    }

    function resetForNewRound() {
        // یاریزانەکان (Client) کاتێک ستاتۆس دەبێتەوە waiting، شاشەکەیان ڕێست دەبێتەوە
        alert("Host یارییەکەی دەستپێکردەوە!");
        location.reload();
    }
</script>

</body>
</html>
