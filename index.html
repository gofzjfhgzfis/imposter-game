<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساختەکار ئۆنلاین - یوسف</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tahoma', sans-serif; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff;
            padding: 20px;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .main-container { width: 100%; max-width: 450px; }
        .app {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; padding: 25px; text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); width: 100%;
        }

        h1 { font-size: 24px; margin-bottom: 5px; }
        .dev-tag { font-size: 12px; opacity: 0.5; margin-bottom: 20px; display: block; }

        button {
            width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #00b4db, #0083b0); color: white;
            font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; 
            border: none; text-align: center; font-weight: bold; font-size: 16px;
        }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .setting-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }
        .setting-item label { display: block; font-size: 11px; margin-bottom: 5px; color: #ccc; }
        .setting-item input { margin: 0; padding: 8px; }

        .room-id-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; margin-bottom: 15px; border: 2px dashed #00b4db; }
        .room-id { font-size: 35px; font-weight: bold; letter-spacing: 4px; }

        .player-card { background: rgba(255,255,255,0.1); padding: 6px 12px; margin: 4px; border-radius: 15px; display: inline-block; font-size: 14px; }
        
        .avatar-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .avatar-option { font-size: 24px; cursor: pointer; padding: 6px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid transparent; transition: 0.2s; }
        .avatar-option.selected { border-color: #38ef7d; background: rgba(56, 239, 125, 0.2); transform: scale(1.1); }

        .timer-display { font-size: 45px; font-weight: bold; color: #f1c40f; margin: 15px 0; }
        .secret-box { font-size: 26px; padding: 35px 15px; background: #fff; color: #222; border-radius: 20px; margin: 15px 0; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .result-list { list-style: none; text-align: right; margin: 15px 0; }
        .result-list li { background: rgba(255,255,255,0.1); margin: 5px 0; padding: 10px; border-radius: 10px; border-right: 4px solid #f1c40f; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="app" id="lobby">
        <h1>🕵️ ساختەکار کێیە؟</h1>
        <span class="dev-tag">پەرەپێدەر: یوسف</span>
        <button onclick="showHost()" style="background: linear-gradient(135deg, #667eea, #764ba2);">🏠 دروستکردنی ژوور</button>
        <button onclick="showJoin()">🚪 جۆین بوون</button>
    </div>

    <div class="app" id="host-area" style="display:none;">
        <div class="room-id-box"><div class="room-id" id="room-code-display">----</div></div>
        
        <div class="settings-grid">
            <div class="setting-item">
                <label>⏱️ کات (خولەک)</label>
                <input type="number" id="game-time" value="3" min="1">
            </div>
            <div class="setting-item">
                <label>🤫 ساختەکار</label>
                <input type="number" id="imposter-count" value="1" min="1" max="3">
            </div>
        </div>

        <select id="game-category">
            <option value="گشتی">🌍 هەمەجۆر</option>
            <option value="خواردن">🍔 خواردن</option>
            <option value="سینەما">🎬 فیلم و سینەما</option>
            <option value="وەرزش">⚽ وەرزش</option>
            <option value="ئۆتۆمبێل">🚗 ئۆتۆمبێل</option>
            <option value="تەکنەلۆژیا">💻 تەکنەلۆژیا</option>
            <option value="ئاژەڵان">🦁 ئاژەڵان</option>
            <option value="وڵاتان">🏳️ وڵاتان</option>
            <option value="پیشەکان">👷 پیشەکان</option>
            <option value="کەسایەتی">👤 کەسایەتییەکان</option>
        </select>

        <div id="players-waiting" style="margin: 15px 0; min-height: 30px;"></div>
        <button onclick="startOnlineGame()" id="start-btn" style="display:none; background: #27ae60;">دەستپێکردن 🚀</button>
    </div>

    <div class="app" id="join-area" style="display:none;">
        <h3>کەسایەتیت هەڵبژێرە:</h3>
        <div class="avatar-selector" id="avatar-list">
            <span class="avatar-option selected" onclick="pickAvatar(this, '🤠')">🤠</span>
            <span class="avatar-option" onclick="pickAvatar(this, '👽')">👽</span>
            <span class="avatar-option" onclick="pickAvatar(this, '🤖')">🤖</span>
            <span class="avatar-option" onclick="pickAvatar(this, '👻')">👻</span>
            <span class="avatar-option" onclick="pickAvatar(this, '🦊')">🦊</span>
            <span class="avatar-option" onclick="pickAvatar(this, '🦁')">🦁</span>
        </div>
        <input type="text" id="join-name-input" placeholder="ناوەکەت">
        <input type="number" id="join-room-input" placeholder="کۆدی ژوور">
        <button onclick="processJoin()">چوونە ژوورەوە</button>
    </div>

    <div class="app" id="game-screen" style="display:none;">
        <div id="timer-display" class="timer-display">00:00</div>
        <div id="secret-box" class="secret-box">...</div>
        <button id="host-trigger-vote" onclick="triggerVoting()" style="display:none; background: #e74c3c;">کۆتایی و دەنگدان 🗳️</button>
    </div>

    <div class="app" id="voting-screen" style="display:none;">
        <h2>🗳️ کێ گومانی لێ دەکرێت؟</h2>
        <div id="vote-list" style="margin-top: 15px;"></div>
        <button id="host-end-vote" onclick="triggerResults()" style="display:none; background: #27ae60; margin-top: 20px;">بینینی ئەنجام 📊</button>
    </div>

    <div class="app" id="results-screen" style="display:none;">
        <h2>📊 ئەنجامەکان</h2>
        <div id="results-content"></div>
        <div id="real-imposters-box" style="color:#ff4757; font-weight:bold; font-size:20px; margin:15px 0; border: 2px solid #ff4757; padding: 10px; border-radius: 15px;"></div>
        <button id="btn-play-again" onclick="resetToLobby()" style="display:none; background: #2ecc71;">دووبارە یاری بکەرەوە 🔄</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCGX5s8Z8m-DhMXDRVmF0F6Yje_p7A",
        authDomain: "yousif-eda79.firebaseapp.com",
        databaseURL: "https://yousif-eda79-default-rtdb.firebaseio.com",
        projectId: "yousif-eda79"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let roomID, myName, myAvatar = '🤠', isHost = false, timerInterval;

    const wordDictionary = {
        "گشتی": ["قوتابخانە", "پرد", "بازاڕ", "کتێب", "پێنووس", "سەعات", "ماڵ", "باخچە", "مزگەوت", "ڕێگا", "چیا", "کۆڵان"],
        "خواردن": ["پیتزا", "کەباب", "دۆڵمە", "برنج", "نیسک", "سێو", "مۆز", "نانی گەرم", "ماسی", "هەنگوین", "ماست", "ترێ"],
        "سینەما": ["باتمان", "سپایدەرمان", "تایتانیک", "جۆکەر", "تارزان", "هاری پۆتەر", "ئۆپنهایمەر", "ئینتەرستێلار", "ماتریكس", "ئەڤەتار"],
        "وەرزش": ["تۆپی پێ", "تێنس", "مەلەوانێتی", "باسکە", "کاراتی", "ڕاکردن", "گۆڵف", "بۆکسێن", "والیباڵ", "شەترەنج"],
        "ئۆتۆمبێل": ["بێ ئێم دەبلیو", "مێرسیدس", "تۆیۆتا", "تێسلا", "فێراری", "لامبۆرگینی", "فۆرد", "نیسان", "جیپ", "رۆڵز رایس"],
        "تەکنەلۆژیا": ["ئایفۆن", "لابتۆپ", "ئینتەرنێت", "فەیسبووک", "گوگڵ", "ڕۆبۆت", "درۆن", "کۆمپیوتەر", "پڕۆگرامینگ", "فایەربەیس"],
        "ئاژەڵان": ["شێر", "بەور", "فیل", "ئەسپ", "سەگ", "پشیلە", "دایناسۆڕ", "مەیموون", "کۆتر", "مار", "کێروێشک", "ووشتر"],
        "وڵاتان": ["کوردستان", "عێراق", "تورکیا", "ئەڵمانیا", "ئەمریکا", "فەڕەنسا", "ئیتاڵیا", "یۆنان", "بەڕازیل", "ژاپۆن", "میسر", "ئێران"],
        "پیشەکان": ["دکتۆر", "مامۆستا", "ئەندازیار", "پۆلیس", "فڕۆکەوان", "نانەوا", "جوتیار", "بەرگدروو", "میکانیک", "پارێزەر"],
        "کەسایەتی": ["نێچیرڤان بارزانی", "مەسعود بارزانی", "کریستیانۆ ڕۆناڵدۆ", "مێسی", "ئیلۆن مەسک", "ئەنیشتاین", "نیوتن", "شێخ مەحمود"]
    };

    function hideAll() { document.querySelectorAll('.app').forEach(el => el.style.display = 'none'); }

    function showHost() {
        isHost = true;
        roomID = Math.floor(1000 + Math.random() * 9000).toString();
        hideAll(); document.getElementById('host-area').style.display = 'block';
        document.getElementById('room-code-display').innerText = roomID;
        db.ref('rooms/' + roomID).set({ status: "waiting" });
        
        db.ref('rooms/' + roomID + '/players').on('value', snap => {
            let players = snap.val();
            if(players) {
                document.getElementById('players-waiting').innerHTML = Object.values(players).map(p => `<span class="player-card">${p.avatar} ${p.name}</span>`).join("");
                if(Object.keys(players).length >= 3) document.getElementById('start-btn').style.display = 'block';
            }
        });
        listenToStatus();
    }

    function showJoin() { hideAll(); document.getElementById('join-area').style.display = 'block'; }
    function pickAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected')); el.classList.add('selected'); myAvatar = icon; }

    function processJoin() {
        myName = document.getElementById('join-name-input').value.trim();
        roomID = document.getElementById('join-room-input').value.trim();
        if(!myName || !roomID) return alert("ناو و کۆد بنووسە");
        db.ref('rooms/' + roomID + '/players').push({ name: myName, avatar: myAvatar });
        document.getElementById('join-area').innerHTML = "<h3>تۆ جۆین بوویت، چاوەڕێی Host بکە...</h3>";
        listenToStatus();
    }

    function listenToStatus() {
        db.ref('rooms/' + roomID + '/status').on('value', snap => {
            let s = snap.val();
            if(s === "active") loadGame();
            else if(s === "voting") loadVote();
            else if(s === "results") loadResults();
            else if(s === "waiting" && document.getElementById('results-screen').style.display === 'block') {
                // کاتێک یاری ڕیسێت دەبێتەوە
                if(isHost) showHostAfterReset(); else location.reload();
            }
        });
    }

    function showHostAfterReset() {
        hideAll(); document.getElementById('host-area').style.display = 'block';
    }

    function startOnlineGame() {
        let cat = document.getElementById('game-category').value;
        let words = wordDictionary[cat];
        let word = words[Math.floor(Math.random() * words.length)];
        let time = parseInt(document.getElementById('game-time').value) * 60;
        let impCount = parseInt(document.getElementById('imposter-count').value);

        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let keys = Object.keys(snap.val());
            let shuffled = keys.sort(() => 0.5 - Math.random());
            let imposters = shuffled.slice(0, Math.min(impCount, keys.length - 1));

            db.ref('rooms/' + roomID).update({ 
                status: "active", word: word, imposters: imposters, 
                category: cat, duration: time, votes: null 
            });
        });
    }

    function loadGame() {
        hideAll(); document.getElementById('game-screen').style.display = 'block';
        if(isHost) document.getElementById('host-trigger-vote').style.display = 'block';
        
        db.ref('rooms/' + roomID).once('value', snap => {
            let d = snap.val();
            let myKey = Object.keys(d.players).find(k => d.players[k].name === myName);
            let box = document.getElementById('secret-box');
            
            if(d.imposters && d.imposters.includes(myKey)) { 
                box.innerText = "تۆ ساختەکاریت! 🤫"; box.style.color = "#ff4757"; 
            } else { 
                box.innerHTML = `<small style="color:#888">بابەت: ${d.category}</small><br>وشە: ${d.word}`; box.style.color = "#27ae60"; 
            }
            startTimer(d.duration);
        });
    }

    function startTimer(sec) {
        let t = sec;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
            if(t-- <= 0) { clearInterval(timerInterval); if(isHost) triggerVoting(); }
        }, 1000);
    }

    function triggerVoting() { db.ref('rooms/' + roomID).update({ status: "voting" }); }

    function loadVote() {
        clearInterval(timerInterval); hideAll(); document.getElementById('voting-screen').style.display = 'block';
        if(isHost) document.getElementById('host-end-vote').style.display = 'block';
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let p = snap.val(), h = "";
            for(let k in p) {
                if(p[k].name !== myName) h += `<button onclick="vote('${p[k].name}', this)">دەنگدان بۆ: ${p[k].avatar} ${p[k].name}</button>`;
            }
            document.getElementById('vote-list').innerHTML = h;
        });
    }

    function vote(votedName, btn) { 
        db.ref('rooms/' + roomID + '/votes/' + myName).set(votedName); 
        document.getElementById('vote-list').innerHTML = "✓ دەنگەکەت تۆمار کرا! چاوەڕێ بکە..."; 
    }

    function triggerResults() { db.ref('rooms/' + roomID).update({ status: "results" }); }

    function loadResults() {
        hideAll(); document.getElementById('results-screen').style.display = 'block';
        if(isHost) document.getElementById('btn-play-again').style.display = 'block';
        db.ref('rooms/' + roomID).once('value', snap => {
            let d = snap.val(), votes = d.votes || {}, tally = {};
            for(let v in votes) tally[votes[v]] = (tally[votes[v]] || 0) + 1;
            
            let h = "<ul class='result-list'>";
            for(let p in tally) h += `<li>👤 ${p}: <b style="color:#f1c40f">${tally[p]} دەنگ</b></li>`;
            document.getElementById('results-content').innerHTML = h + "</ul>";
            
            let impNames = d.imposters.map(id => d.players[id].avatar + " " + d.players[id].name).join(" و ");
            document.getElementById('real-imposters-box').innerText = "ساختەکار: " + impNames;
        });
    }

    function resetToLobby() {
        db.ref('rooms/' + roomID).update({ status: "waiting", votes: null, word: null, imposters: null });
    }
</script>
</body>
</html>
