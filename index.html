<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPOSTER | Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="glass-card">
        <div id="screen-lobby" class="screen active">
            <h1 class="logo-text">IMPOSTER</h1>
            <div class="creator-badge">
                <span class="pulse-dot"></span>
                گـەشـەپـێـدراوە لـەلایـەن یـوسـف
            </div>
            <button onclick="initHost()">دروستکردنی ژوور</button>
            <button class="btn-secondary" onclick="showScreen('screen-join')">جۆین بوون</button>
        </div>

        <div id="screen-host" class="screen">
            <h3 style="opacity:0.6; font-size: 13px;">کۆدی ژوورەکەت</h3>
            <div class="room-code" id="display-room-id">----</div>
            
            <div id="host-only-ui" style="display:none; text-align: right;">
                <div class="settings-grid">
                    <div class="input-group">
                        <label>خولەک ⏱️</label>
                        <input type="number" id="inp-time" value="3" min="1">
                    </div>
                    <div class="input-group">
                        <label>ساختەکار 🕵️</label>
                        <input type="number" id="inp-imps" value="1" min="1">
                    </div>
                </div>
                
                <label>کەتەگۆری یاری 🎭</label>
                <select id="inp-cat" class="category-select">
                    <option value="گشتی">🌍 گشتی</option>
                    <option value="فیلم">🎬 فیلم و سینەما</option>
                    <option value="تەکنەلۆژیا">💻 تەکنەلۆژیا</option>
                    <option value="ئۆتۆمبێل">🏎️ ئۆتۆمبێل</option>
                    <option value="خواردن">🍕 خواردن و میوە</option>
                    <option value="وەرزش">⚽ وەرزش</option>
                    <option value="گەیمینگ">🎮 یارییە ڤیدیۆییەکان</option>
                    <option value="ئاژەڵان">🐾 ئاژەڵان</option>
                    <option value="زانکۆ">🎓 ژیانی زانکۆ</option>
                    <option value="گەردوون">🚀 گەردوون</option>
                </select>
            </div>
            <div id="player-list" class="player-container"></div>
            <button id="btn-start" style="display:none;" onclick="startGame()">دەستپێکردن ⚡</button>
        </div>

        <div id="screen-join" class="screen">
            <h2>چوونە ناو ژوور</h2>
            <input type="text" id="join-name" placeholder="ناوەکەت بنووسە">
            <input type="number" id="join-code" placeholder="کۆدی ژوور">
            <button onclick="joinRoom()">چوونە ناوەوە</button>
            <button class="btn-outline" onclick="showScreen('screen-lobby')">گەڕانەوە</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="timer" id="game-timer">00:00</div>
            <div id="role-box" class="word-box">...</div>
            <p id="cat-hint" style="opacity:0.8; font-weight:bold;"></p>
            <button id="stop-game-btn" style="display:none; background: #ff4b2b; color: white;" onclick="updateStatus('voting')">کۆتایی و دەنگدان</button>
        </div>

        <div id="screen-voting" class="screen">
            <h2 style="margin-bottom:20px;">کێ گوماناوییە؟ 🧐</h2>
            <div id="voting-list" class="voting-grid"></div>
        </div>

        <div id="screen-results" class="screen">
            <h2 style="color:#ff4b2b;">ئەنجامەکان</h2>
            <div id="imposter-reveal" class="word-box-results"></div>
            <div id="vote-summary" class="summary-list"></div>
            <button style="margin-top:20px;" onclick="location.reload()">دووبارە یاری 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
