<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imposter Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="screen active">
            <h1 class="logo-text">IMPOSTER</h1>
            <div class="dev-tag">گەشەپێدراوە لەلایەن یوسف</div>
            <button onclick="showMode('create')" class="btn-cyan">دروستکردنی ژوور</button>
            <button onclick="showMode('join')" class="btn-cyan" style="background: #4a5568; color: white;">جۆین بوون</button>
        </div>

        <div id="auth-screen" class="screen">
            <h2 id="mode-title"></h2>
            <input type="text" id="playerName" placeholder="ناوت بنووسە...">
            <div id="join-inputs" style="display: none;">
                <input type="number" id="roomCodeInput" placeholder="کۆدی ژوور...">
            </div>
            <button id="action-btn" onclick="handleAction()" class="btn-cyan">بەردەوام بوون</button>
            <button onclick="showScreen('start-screen')" class="btn-back">گەڕانەوە</button>
        </div>

        <div id="waiting-screen" class="screen">
            <h2 class="lobby-title">کۆدی ژوور: <span id="displayRoomCode"></span></h2>
            <ul id="playersList"></ul>
            <div id="hostControls" style="display: none;">
                <button onclick="startGame()" class="btn-start">دەستپێکردنی یاری</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="roleDisplay" class="role-card"></div>
            <div id="hostReplay" style="display: none;">
                <button onclick="playAgain()" class="btn-start">دووبارە یاریکردنەوە</button>
            </div>
            <button onclick="leaveRoom()" class="btn-leave">چوونە دەرەوە</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
