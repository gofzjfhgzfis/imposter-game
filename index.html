<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساختەکار ئۆنلاین - یوسف</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Tahoma', sans-serif; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-container { width: 100%; max-width: 450px; position: relative; }

        .app {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px; padding: 30px; text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); width: 100%;
        }

        h1, h2 { margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .dev-name { opacity: 0.6; font-size: 14px; margin-bottom: 25px; display: block; }

        button {
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #00b4db, #0083b0); color: white;
            font-weight: bold; font-size: 18px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: none; background: rgba(255,255,255,0.9); text-align: center;
            font-size: 16px; color: #222; font-weight: bold; outline: none;
        }
        input:focus, select:focus { border: 2px solid #00b4db; background: #fff; }

        .room-id-box {
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px;
            margin: 20px 0; border: 2px dashed #00b4db;
        }
        .room-id { font-size: 40px; font-weight: bold; letter-spacing: 5px; color: #fff; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .settings-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; }
        .settings-card label { display: block; font-size: 13px; color: #ddd; margin-bottom: 8px; }
        .settings-card input { margin: 0; padding: 10px; font-size: 20px; }
        .category-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-top: 15px; }

        .player-card {
            background: rgba(255,255,255,0.15); padding: 8px 15px; margin: 5px;
            border-radius: 20px; display: inline-block; font-weight: bold; font-size: 15px;
        }

        /* ستایلی ئاڤاتارەکان */
        .avatar-selector { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .avatar-option { 
            font-size: 30px; cursor: pointer; padding: 5px; border-radius: 50%; 
            border: 2px solid transparent; transition: 0.3s; background: rgba(255,255,255,0.1);
        }
        .avatar-option.selected { border-color: #38ef7d; background: rgba(56, 239, 125, 0.3); transform: scale(1.1); }

        .timer-display { font-size: 50px; font-weight: bold; color: #f1c40f; margin: 20px 0; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        .secret-box {
            font-size: 30px; padding: 40px 20px; background: rgba(255,255,255,0.95);
            color: #222; border-radius: 20px; margin: 20px 0; font-weight: bold;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        .qr-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 20px; }
        .qr-card img { border-radius: 10px; width: 140px; padding: 5px; background: white; }

        .vote-btn { background: linear-gradient(135deg, #e67e22, #d35400); }
        .result-list { list-style: none; text-align: right; margin-top: 15px; }
        .result-list li { background: rgba(0,0,0,0.3); margin: 5px 0; padding: 10px 15px; border-radius: 10px; font-size: 18px; }
        .real-imposter-text { color: #ff4757; font-size: 26px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-container">

    <div class="app" id="lobby">
        <h1>🕵️ ساختەکار کێیە؟</h1>
        <span class="dev-name">پەرەپێدەر: یوسف</span>

        <button onclick="showHost()" style="background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #333;">🏠 دروستکردنی ژوور</button>
        <button onclick="showJoin()">🚪 جۆین بوون بە کۆد</button>
    </div>

    <div class="app" id="host-area" style="display:none;">
        <h3>کۆدەکە بنێرە بۆ هاوڕێکانت:</h3>
        <div class="room-id-box">
            <div class="room-id" id="room-code-display">----</div>
        </div>
        
        <div class="settings-grid">
            <div class="settings-card">
                <label>⏱️ کات (خولەک)</label>
                <input type="number" id="game-time" value="3" min="1">
            </div>
            <div class="settings-card">
                <label>🤫 ژمارەی ساختەکار</label>
                <input type="number" id="imposter-count" value="1" min="1" max="3">
            </div>
        </div>

        <div class="category-card">
            <label style="font-size: 13px; color: #ddd; display: block; margin-bottom: 5px;">🗂️ بابەتی یارییەکە</label>
            <select id="game-category">
                <option value="گشتی">هەمەجۆر (گشتی)</option>
                <option value="خواردن">خواردن 🍔</option>
                <option value="سینەما">فیلم و سینەما 🎬</option>
                <option value="تەکنەلۆژیا">تەکنەلۆژیا 💻</option>
            </select>
        </div>

        <div style="margin: 20px 0;">
            <p style="font-size: 14px; color: #aaa;">یاریزانەکان:</p>
            <div id="players-waiting" style="min-height: 40px;">پێویستت بە ٣ یاریزانە...</div>
        </div>
        
        <button onclick="startOnlineGame()" id="start-btn" style="display:none; background: linear-gradient(135deg, #11998e, #38ef7d);">دەستپێکردن 🚀</button>
        
        <div class="qr-card">
            <img id="qr-code">
        </div>
    </div>

    <div class="app" id="join-area" style="display:none;">
        <h3 style="margin-bottom: 10px;">کەسایەتیت هەڵبژێرە:</h3>
        <div class="avatar-selector" id="avatar-list">
            <span class="avatar-option selected" onclick="pickAvatar(this, '🤠')">🤠</span>
            <span class="avatar-option" onclick="pickAvatar(this, '👽')">👽</span>
            <span class="avatar-option" onclick="pickAvatar(this, '🤖')">🤖</span>
            <span class="avatar-option" onclick="pickAvatar(this, '🐱')">🐱</span>
            <span class="avatar-option" onclick="pickAvatar(this, '👻')">👻</span>
        </div>
        
        <input type="text" id="join-name-input" placeholder="ناوی خۆت بنووسە">
        <input type="number" id="join-room-input" placeholder="کۆدی ژوور (٤ ڕەقەم)">
        <button onclick="processJoin()" style="background: linear-gradient(135deg, #11998e, #38ef7d);">چوونە ژوورەوە</button>
    </div>

    <div class="app" id="game-screen" style="display:none;">
        <h3 id="player-role-name" style="opacity: 0.8;">---</h3>
        <div id="timer-display" class="timer-display">00:00</div>
        <div id="secret-box" class="secret-box">...</div>
        
        <button id="host-trigger-vote" onclick="triggerVoting()" style="display:none; background: #e74c3c;">وەستاندن و دەنگدان 🗳️</button>
    </div>

    <div class="app" id="voting-screen" style="display:none;">
        <h2>🗳️ کاتی دەنگدانە!</h2>
        <p style="margin-bottom: 15px; opacity: 0.8;">گومانت لە کێیە؟</p>
        <div id="vote-list"></div>
        <p id="vote-status" style="color: #38ef7d; margin-top: 10px; font-weight: bold;"></p>

        <button id="host-end-vote" onclick="triggerResults()" style="display:none; background: #27ae60; margin-top: 25px;">پیشاندانی ئەنجام 📊</button>
    </div>

    <div class="app" id="results-screen" style="display:none;">
        <h2>📊 ئەنجامی دەنگدان</h2>
        <div id="results-content"></div>
        <div id="real-imposters-box" class="real-imposter-text"></div>
        
        <button onclick="location.reload()" style="background: #333; margin-top: 30px;">🔄 یارییەکی نوێ</button>
    </div>

</div>

<script>
    const lobbyMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3'); 
    lobbyMusic.loop = true; lobbyMusic.volume = 0.3;
    const startSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

    const firebaseConfig = {
        apiKey: "AIzaSyCGX5s8Z8m-DhMXDRVmF0F6Yje_p7A",
        authDomain: "yousif-eda79.firebaseapp.com",
        databaseURL: "https://yousif-eda79-default-rtdb.firebaseio.com",
        projectId: "yousif-eda79"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let roomID, myName, myAvatar = '🤠', isHost = false, timerInterval;

    // وشەکان بەپێی بابەت
    const wordDictionary = {
        "گشتی": ["قوتابخانە", "پارک", "پردی دەلال", "مۆزەخانە", "کتێبخانە", "سەیرانگا", "زانکۆ", "نەخۆشخانە"],
        "خواردن": ["پیتزا", "بەرگر", "شاورمە", "کەباب", "بریانی", "دۆڵمە", "سوشى", "مەندی"],
        "سینەما": ["ئینتەرستێلار", "ئینسیپشن", "زیندانییەکان", "ئۆپنهایمەر", "سێڤن", "دارک", "تایتانیک", "باتمان"],
        "تەکنەلۆژیا": ["مۆبایل", "کۆمپیوتەر", "ئایپاد", "سێرڤەر", "کیبۆرد", "ماوس", "کۆدینگ", "پڕۆگرامینگ"]
    };

    function hideAll() { document.querySelectorAll('.app').forEach(el => el.style.display = 'none'); }

    function listenToRoomStatus() {
        db.ref('rooms/' + roomID + '/status').on('value', snap => {
            let s = snap.val();
            if(s === "active") loadGameView();
            else if(s === "voting") loadVotingView();
            else if(s === "results") loadResultsView();
        });
    }

    function showHost() {
        isHost = true;
        lobbyMusic.play().catch(()=>{});
        roomID = Math.floor(1000 + Math.random() * 9000).toString();
        
        hideAll();
        document.getElementById('host-area').style.display = 'block';
        document.getElementById('room-code-display').innerText = roomID;
        
        setTimeout(() => {
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://gofzjfghzfis.github.io/imposter-game/`;
        }, 500);

        db.ref('rooms/' + roomID + '/players').on('value', (snap) => {
            const players = snap.val();
            if(players) {
                // پیشاندانی ناو لەگەڵ ئاڤاتار
                document.getElementById('players-waiting').innerHTML = Object.values(players).map(p => `<span class="player-card">${p.avatar} ${p.name}</span>`).join("");
                if(Object.keys(players).length >= 3) document.getElementById('start-btn').style.display = 'block';
            }
        });
        listenToRoomStatus();
    }

    function showJoin() {
        lobbyMusic.play().catch(()=>{});
        hideAll();
        document.getElementById('join-area').style.display = 'block';
    }

    function pickAvatar(element, icon) {
        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        myAvatar = icon;
    }

    function processJoin() {
        myName = document.getElementById('join-name-input').value.trim();
        roomID = document.getElementById('join-room-input').value.trim();
        if(!myName || !roomID) return alert("تکایە ناو و کۆد بنووسە!");
        
        db.ref('rooms/' + roomID + '/players').push({ name: myName, avatar: myAvatar });
        document.getElementById('join-area').innerHTML = `<h3>${myAvatar} تۆ لە ژوورەوەیت! چاوەڕێ بکە... 🎵</h3>`;
        listenToRoomStatus();
    }

    function startOnlineGame() {
        let selectedCategory = document.getElementById('game-category').value;
        let wordsList = wordDictionary[selectedCategory];
        let secretWord = wordsList[Math.floor(Math.random() * wordsList.length)];
        
        let reqTime = (parseInt(document.getElementById('game-time').value) || 3) * 60;
        let reqImposters = parseInt(document.getElementById('imposter-count').value) || 1;
        
        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let players = snap.val();
            let keys = Object.keys(players);
            
            if (reqImposters >= keys.length) reqImposters = keys.length - 1;
            let shuffledKeys = keys.sort(() => 0.5 - Math.random());
            let imposterIDs = shuffledKeys.slice(0, reqImposters);

            db.ref('rooms/' + roomID).update({ 
                status: "active", word: secretWord, imposters: imposterIDs, duration: reqTime, votes: null, category: selectedCategory 
            });
        });
    }

    function loadGameView() {
        lobbyMusic.pause();
        startSound.play().catch(()=>{});
        hideAll();
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('player-role-name').innerText = (myAvatar || "🏠") + " " + (myName || "Host");
        
        if(isHost) document.getElementById('host-trigger-vote').style.display = 'block';
        
        db.ref('rooms/' + roomID).once('value', snap => {
            let data = snap.val();
            let myKey = Object.keys(data.players).find(k => data.players[k].name === myName);
            let box = document.getElementById('secret-box');
            
            if(data.imposters && data.imposters.includes(myKey)) {
                box.innerText = "تۆ ساختەکاریت! 🤫";
                box.style.color = "#ff4757";
            } else {
                box.innerHTML = `<span style="font-size:18px; color:#888; display:block; margin-bottom:10px;">بابەت: ${data.category}</span>وشە: ${data.word}`;
                box.style.color = "#2ed573";
            }
            startTimer(data.duration);
        });
    }

    function startTimer(seconds) {
        let timeLeft = seconds;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            
            if(timeLeft <= 0) { 
                clearInterval(timerInterval); 
                document.getElementById('timer-display').innerText = "کاتی دەنگدانە!";
                if(isHost) triggerVoting(); 
            }
            timeLeft--;
        }, 1000);
    }

    function triggerVoting() { db.ref('rooms/' + roomID).update({ status: "voting" }); }

    function loadVotingView() {
        clearInterval(timerInterval);
        hideAll();
        document.getElementById('voting-screen').style.display = 'block';
        if(isHost) document.getElementById('host-end-vote').style.display = 'block';

        db.ref('rooms/' + roomID + '/players').once('value', snap => {
            let players = snap.val();
            let html = "";
            for(let key in players) {
                if(players[key].name !== myName) {
                    html += `<button class="vote-btn" onclick="submitVote('${players[key].name}', this)">دەنگدان بۆ: ${players[key].avatar} ${players[key].name}</button>`;
                }
            }
            document.getElementById('vote-list').innerHTML = html;
        });
    }

    function submitVote(votedName, btnElement) {
        if(!myName) return; 
        db.ref('rooms/' + roomID + '/votes/' + myName).set(votedName);
        document.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
        document.getElementById('vote-status').innerText = "✓ دەنگەکەت تۆمار کرا";
    }

    function triggerResults() { db.ref('rooms/' + roomID).update({ status: "results" }); }

    function loadResultsView() {
        hideAll();
        document.getElementById('results-screen').style.display = 'block';
        
        db.ref('rooms/' + roomID).once('value', snap => {
            let data = snap.val();
            let players = data.players, votes = data.votes || {}, imposters = data.imposters || [];
            
            let tally = {};
            for(let voter in votes) { tally[votes[voter]] = (tally[votes[voter]] || 0) + 1; }
            
            let voteHtml = "<ul class='result-list'>";
            if(Object.keys(tally).length === 0) voteHtml += "<li>کەس دەنگی نەداوە!</li>";
            else {
                for(let person in tally) voteHtml += `<li>👤 ${person}: <b style="color:#f1c40f">${tally[person]} دەنگ</b></li>`;
            }
            voteHtml += "</ul>";
            document.getElementById('results-content').innerHTML = voteHtml;
            
            let imposterNames = imposters.map(key => players[key] ? `${players[key].avatar} ${players[key].name}` : "نەزانراو").join(" و ");
            document.getElementById('real-imposters-box').innerText = "ساختەکاری ڕاستەقینە: " + imposterNames;
        });
    }
</script>
</body>
</html>
